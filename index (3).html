<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SKK Maintenance Pro V3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0984e3; --dark: #2d3436; --bg: #f1f2f6; --danger: #d63031; --success: #00b894; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        .top-bar { background: white; padding: 10px 15px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .machine-card { background: #2d3436; color: white; border-radius: 20px; padding: 20px; margin-bottom: 10px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .info-item { background: rgba(255,255,255,0.1); padding: 8px; border-radius: 8px; }
        .info-label { font-size: 10px; color: #00cec9; font-weight: bold; }
        .info-value { font-size: 13px; margin-top: 2px; }
        .gauge-box { position: relative; height: 160px; width: 100%; margin: 10px 0; }
        .gauge-text { position: absolute; top: 65%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .btn { border: none; border-radius: 10px; padding: 12px; font-weight: bold; cursor: pointer; text-align: center; font-size: 14px; }
        .btn-blue { background: var(--primary); color: white; width: 100%; }
        .btn-gray { background: #dfe6e9; color: #333; }
        .field { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 10px; font-size: 16px; outline: none; }
        .photo-thumb { width: 75px; height: 75px; object-fit: cover; border-radius: 10px; border: 3px solid transparent; }
        .photo-thumb.active { border-color: var(--primary); }
        .gallery-item { position: relative; display: inline-block; margin-right: 8px; margin-bottom: 8px; }
        .del-btn { position: absolute; top: -8px; right: -8px; background: var(--danger); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; font-size: 14px; z-index: 5; }
        .hist-photo-link { display: inline-block; padding: 6px 10px; border-radius: 6px; text-decoration: none; font-size: 11px; margin: 3px; font-weight: bold; color: #333; border: 1px solid #ddd; }
        .hidden { display: none; }
        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:9999; display:none; align-items:center; justify-content:center; flex-direction: column; }
        #editCanvas { background: #000; width: 100%; border-radius: 12px; touch-action: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tool-btn { background: #636e72; color: white; }
        .active-tool { background: var(--primary) !important; color: white; box-shadow: 0 0 0 3px rgba(9,132,227,0.4); }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">
    <div style="border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
    <div id="loading-text" style="margin-top:10px; font-weight:bold;">通信中...</div>
</div>

<div id="view-lock" class="container" style="text-align:center; padding-top: 50px;">
    <div class="card">
        <h2 style="color: var(--primary);">SKK Login</h2>
        <input type="password" id="teamCodeInput" class="field" placeholder="Team Code" style="text-align:center;">
        <button class="btn btn-blue" onclick="checkTeamCode()">ログイン</button>
    </div>
</div>

<div id="main-ui" style="display:none;">
    <div class="top-bar">
        <button id="btn-back" class="btn btn-gray hidden" onclick="goBack()">⬅ 戻る</button>
        <div style="flex-grow: 1; text-align: center; font-weight: bold;">SKK SERVICE</div>
        <button class="btn btn-blue" style="width: auto; padding: 8px 15px;" onclick="startScanner()">📷 ｽｷｬﾝ</button>
    </div>

    <div class="container">
        <div id="view-home" style="text-align:center; padding: 50px 0;">
            <h3>BIM・NF TEAM</h3>
            <p>QRコードを読み取ってください</p>
        </div>

        <div id="view-info" class="hidden">
            <div class="machine-card">
                <h2 id="m-name" style="margin:0; font-size: 24px; color: #00cec9;">--</h2>
                <div id="details-grid" class="info-grid"></div>
            </div>

            <div class="card">
                <h4 style="margin:0; text-align:center; color:#636e72;">ライフサイクル</h4>
                <div class="gauge-box">
                    <canvas id="lifeGaugeChart"></canvas>
                    <div class="gauge-text">
                        <div id="rem-years-val" style="font-size: 32px; font-weight: 900;">--</div>
                        <div style="font-size: 10px; font-weight: bold;">残り年数</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h4>点検報告</h4>
                <input type="text" id="f-tech" class="field" placeholder="担当者名">
                <select id="f-type" class="field"></select>
                <textarea id="f-desc" class="field" rows="2" placeholder="点検メモ"></textarea>
                
                <input type="file" id="f-file" accept="image/*" multiple class="hidden" onchange="handlePhotos(event)">
                <button class="btn btn-gray" style="width:100%; border: 2px dashed #ccc;" onclick="document.getElementById('f-file').click()">📸 写真撮影・選択</button>
                <div id="photo-gallery" style="margin-top:15px; display:flex; flex-wrap:wrap;"></div>

                <div id="canvas-wrapper" class="hidden" style="margin-top:10px; background:#2d3436; padding:10px; border-radius:12px;">
                    <canvas id="editCanvas"></canvas>
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-top:10px;">
                        <button id="tool-pen"   class="btn tool-btn active-tool" onclick="setMode('pen')">✏️ ペン</button>
                        <button id="tool-arrow" class="btn tool-btn" onclick="setMode('arrow')">➡️ 矢印</button>
                        <button id="tool-text"  class="btn tool-btn" onclick="setMode('text')">🔤 TXT</button>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; margin-top:5px;">
                        <button class="btn btn-gray" onclick="undoEdit()">↩ 戻る</button>
                        <label class="btn btn-gray" style="display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;">
                            🎨 <input type="color" id="colorPicker" value="#ff0000" style="width:24px;height:24px;border:none;padding:0;cursor:pointer;background:none;">
                        </label>
                        <button class="btn btn-blue" style="background:var(--success)" onclick="saveEdit()">✅ 完了</button>
                    </div>
                </div>
                
                <button id="btn-submit" class="btn btn-blue" style="margin-top:20px; height:60px; font-size:18px;" onclick="doSubmit()">点検記録を保存</button>
            </div>

            <div class="card">
                <h4 style="border-bottom:1px solid #eee; padding-bottom:5px;">最近の履歴</h4>
                <div id="history-box"></div>
            </div>
        </div>
    </div>
</div>

<div id="scannerContainer" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000;">
    <video id="video" style="width:100%; height:85%; object-fit:cover;" playsinline></video>
    <div style="height:15%; display:flex; align-items:center; justify-content:center; background:#000;">
        <button class="btn btn-gray" style="width:80%; background:var(--danger); color:white;" onclick="stopScanner()">閉じる</button>
    </div>
</div>

<script>
    // --- SETTINGS ---
    const API_URL = "https://script.google.com/macros/s/AKfycbxKI6c0lQFYt-oqlDxacyKowUqkOqnYlhp6xu_Iz1kEnWSpBWkfSPhr1MbREcxXoCtI/exec"; 
    let currentMachine = {}, photoQueue = [], myChart = null, scanStream = null;
    let canvas, ctx, originalImg, editMode = 'pen', activeIdx = null;

    function checkTeamCode() {
        if(document.getElementById('teamCodeInput').value === "0000") {
            localStorage.setItem('skk_authorized', 'true');
            document.getElementById('view-lock').style.display='none';
            document.getElementById('main-ui').style.display='block';
            loadCategories();
        }
    }
    window.onload = () => { if(localStorage.getItem('skk_authorized')==='true') checkTeamCode(); };

    // --- DATA LOADING ---
    async function loadMachine(guid) {
        setLoading(true, "データ取得中...");
        try {
            const res = await fetch(`${API_URL}?action=getMachineByGUID&guid=${guid}`);
            const data = await res.json();
            if(data.success) {
                currentMachine = data.machine;
                document.getElementById('m-name').innerText = data.machine.machineNo || "No Name";
                
                const grid = document.getElementById('details-grid');
                grid.innerHTML = "";
                Object.keys(data.machine.fullDetails).forEach(k => {
                    grid.innerHTML += `<div class="info-item"><div class="info-label">${k}</div><div class="info-value">${data.machine.fullDetails[k]}</div></div>`;
                });
                
                renderLifeGauge(data.machine.lifeUsed, data.machine.remYears);
                loadHistory(guid);
                document.getElementById('view-info').classList.remove('hidden');
                document.getElementById('view-home').classList.add('hidden');
                document.getElementById('btn-back').classList.remove('hidden');
            }
        } catch(e) { alert("データ取得エラー"); }
        setLoading(false);
    }

    async function loadHistory(guid) {
        try {
            const res = await fetch(`${API_URL}?action=getMaintenanceHistory&guid=${guid}`);
            const data = await res.json();
            const container = document.getElementById('history-box');
            
            container.innerHTML = data.history.length ? data.history.map(h => {
                const createLinks = (str, label, color) => {
                    if(!str || str.trim() === "") return "";
                    return str.split("\n").map((url, i) => 
                        `<a href="${url}" target="_blank" class="hist-photo-link" style="background:${color};">${label} ${i+1}</a>`
                    ).join('');
                };

                const editedLinks = createLinks(h.editedPhotos, "編集写真", "#fff3e0");
                const originalLinks = createLinks(h.originalPhotos, "元写真", "#e1f5fe");

                return `
                <div style="padding:12px 0; border-bottom:1px solid #eee; font-size:13px;">
                    <div style="color:#666; font-size:11px;">${h.date} | ${h.tech}</div>
                    <div style="margin: 4px 0;"><b>${h.type}</b>: ${h.desc}</div>
                    <div style="margin-top:8px;">
                        ${editedLinks ? `<div style="font-size:10px; font-weight:bold; color:#e67e22; margin-bottom:2px;">【編集写真】</div><div style="display:flex; flex-wrap:wrap;">${editedLinks}</div>` : ""}
                        ${originalLinks ? `<div style="font-size:10px; font-weight:bold; color:#2980b9; margin-top:5px; margin-bottom:2px;">【元写真】</div><div style="display:flex; flex-wrap:wrap;">${originalLinks}</div>` : ""}
                    </div>
                </div>`;
            }).join('') : "履歴はありません";
        } catch(e) { console.error("History Error"); }
    }

    // --- PHOTO LOGIC ---
    async function handlePhotos(e) {
        const files = Array.from(e.target.files);
        setLoading(true, "画像処理中...");
        for(let f of files) {
            const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload=ev=>r(ev.target.result); rd.readAsDataURL(f); });
            const compressed = await compressImage(b64);
            photoQueue.push({ original: compressed, edited: compressed, isEdited: false });
        }
        renderGallery(); 
        setLoading(false);
        e.target.value = ""; 
    }

    function renderGallery() {
        document.getElementById('photo-gallery').innerHTML = photoQueue.map((p, i) => `
            <div class="gallery-item">
                <div class="del-btn" onclick="removePhoto(${i})">×</div>
                <img src="${p.edited}" class="photo-thumb ${activeIdx===i?'active':''}" onclick="startEdit(${i})">
                ${p.isEdited ? '<div style="position:absolute; bottom:2px; right:2px; background:var(--success); color:white; font-size:8px; padding:1px 4px; border-radius:4px;">EDITED</div>' : ''}
            </div>`).join('');
    }

    function removePhoto(i) { photoQueue.splice(i,1); if(activeIdx===i) closeEditor(); activeIdx=null; renderGallery(); }

    // --- CANVAS EDITOR ---
    function startEdit(i) {
        activeIdx = i; renderGallery();
        originalImg = new Image();
        originalImg.onload = () => {
            document.getElementById('canvas-wrapper').classList.remove('hidden');
            canvas = document.getElementById('editCanvas'); ctx = canvas.getContext('2d');
            const aspect = originalImg.height / originalImg.width;
            canvas.width = 1000; canvas.height = 1000 * aspect;
            ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);
            initCanvas();
            document.getElementById('canvas-wrapper').scrollIntoView({behavior: "smooth"});
        };
        originalImg.src = photoQueue[i].original;
    }

    function saveEdit() {
        photoQueue[activeIdx].edited = canvas.toDataURL("image/jpeg", 0.5);
        photoQueue[activeIdx].isEdited = true;
        closeEditor();
    }
    function closeEditor() { document.getElementById('canvas-wrapper').classList.add('hidden'); renderGallery(); }

    let undoStack = [];

    function saveSnapshot() {
        undoStack.push(canvas.toDataURL());
        if (undoStack.length > 20) undoStack.shift(); // keep max 20 steps
    }

    function undoEdit() {
        if (undoStack.length === 0) return;
        const prev = undoStack.pop();
        const img = new Image();
        img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); };
        img.src = prev;
    }

    function getColor() { return document.getElementById('colorPicker').value; }

    function setMode(m) {
        editMode = m;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active-tool'));
        const map = { pen: 'tool-pen', arrow: 'tool-arrow', text: 'tool-text' };
        if (map[m]) document.getElementById(map[m]).classList.add('active-tool');
    }

    function drawArrow(x1, y1, x2, y2, color) {
        const headLen = 28;
        const angle = Math.atan2(y2 - y1, x2 - x1);
        ctx.strokeStyle = color; ctx.fillStyle = color;
        ctx.lineWidth = 6; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - headLen * Math.cos(angle - Math.PI/6), y2 - headLen * Math.sin(angle - Math.PI/6));
        ctx.lineTo(x2 - headLen * Math.cos(angle + Math.PI/6), y2 - headLen * Math.sin(angle + Math.PI/6));
        ctx.closePath(); ctx.fill();
    }

    function initCanvas() {
        undoStack = [];
        const getXY = e => {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (cx - rect.left) * (canvas.width / rect.width), y: (cy - rect.top) * (canvas.height / rect.height) };
        };

        let arrowStart = null;
        let arrowSnapshot = null;

        canvas.onmousedown = canvas.ontouchstart = e => {
            e.preventDefault();
            const { x, y } = getXY(e);
            const color = getColor();
            if (editMode === 'text') {
                const t = prompt("文字:");
                if (t) {
                    saveSnapshot();
                    ctx.fillStyle = color;
                    ctx.font = "bold 60px sans-serif";
                    ctx.fillText(t, x, y);
                }
            } else if (editMode === 'arrow') {
                saveSnapshot();
                arrowStart = { x, y };
                arrowSnapshot = canvas.toDataURL(); // base for live preview
            } else {
                saveSnapshot();
                ctx.strokeStyle = color; ctx.lineWidth = 10; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(x, y);
                canvas.isDrawing = true;
            }
        };

        canvas.onmousemove = canvas.ontouchmove = e => {
            e.preventDefault();
            const { x, y } = getXY(e);
            if (editMode === 'pen' && canvas.isDrawing) {
                ctx.lineTo(x, y); ctx.stroke();
            } else if (editMode === 'arrow' && arrowStart) {
                // Live preview: redraw from snapshot then draw arrow
                const snap = new Image();
                snap.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(snap, 0, 0);
                    drawArrow(arrowStart.x, arrowStart.y, x, y, getColor());
                };
                snap.src = arrowSnapshot;
            }
        };

        const endAction = e => {
            if (editMode === 'arrow' && arrowStart) {
                const { x, y } = getXY(e);
                // Final arrow drawn on mouseup/touchend
                const snap = new Image();
                snap.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(snap, 0, 0);
                    drawArrow(arrowStart.x, arrowStart.y, x, y, getColor());
                };
                snap.src = arrowSnapshot;
                arrowStart = null; arrowSnapshot = null;
            }
            canvas.isDrawing = false;
        };
        window.onmouseup = endAction;
        window.ontouchend = e => { if(e.changedTouches) endAction({ clientX: e.changedTouches[0].clientX, clientY: e.changedTouches[0].clientY }); };
    }

    // --- SUBMISSION ---
    async function doSubmit() {
        const tech = document.getElementById('f-tech').value;
        if(!tech || photoQueue.length === 0) return alert("名前と写真が必要です");
        
        const btn = document.getElementById('btn-submit');
        btn.disabled = true;
        setLoading(true, "保存中... (しばらくお待ちください)");
        
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'addMaintenance', guid: currentMachine.guid, machineNo: currentMachine.machineNo,
                    technician: tech, maintenanceType: document.getElementById('f-type').value,
                    description: document.getElementById('f-desc').value, photoList: photoQueue
                })
            });
            const result = await res.json();
            if(result.success) { 
                alert("保存完了しました"); 
                document.getElementById('f-desc').value = "";
                photoQueue = []; renderGallery();
                loadHistory(currentMachine.guid);
            }
        } catch(e) { alert("通信エラーが発生しました"); }
        setLoading(false);
        btn.disabled = false;
    }

    // --- HELPERS ---
    function compressImage(b64) {
        return new Promise(r => {
            const img = new Image(); img.onload=()=>{
                const c = document.createElement('canvas'); const w = 1200; const h = w*(img.height/img.width);
                c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h); r(c.toDataURL("image/jpeg", 0.7));
            }; img.src=b64;
        });
    }

    function renderLifeGauge(used, rem) {
        document.getElementById('rem-years-val').innerText = rem;
        const ctxChart = document.getElementById('lifeGaugeChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctxChart, {
            type: 'doughnut',
            data: { datasets: [{ data: [used, 100-used], backgroundColor: ['#0984e3', '#dfe6e9'], borderWidth: 0 }] },
            options: { cutout: '85%', rotation: -90, circumference: 180, maintainAspectRatio: false, plugins: { tooltip: {enabled: false} } }
        });
    }

    function setLoading(s, t="通信中...") { document.getElementById('loading').style.display=s?'flex':'none'; document.getElementById('loading-text').innerText=t; }
    // setMode is defined above with initCanvas
    function goBack() { document.getElementById('view-info').classList.add('hidden'); document.getElementById('view-home').classList.remove('hidden'); document.getElementById('btn-back').classList.add('hidden'); }

    async function loadCategories() {
        const res = await fetch(`${API_URL}?action=getCategories`);
        const data = await res.json();
        document.getElementById('f-type').innerHTML = data.categories.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    // --- QR SCANNER (Standard Implementation) ---
    async function startScanner() {
        const container = document.getElementById('scannerContainer');
        const video = document.getElementById('video');
        container.classList.remove('hidden');
        try {
            scanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = scanStream;
            video.play();
            requestAnimationFrame(tick);
        } catch (e) { alert("カメラを起動できませんでした。HTTPS接続を確認してください。"); stopScanner(); }
    }
    function stopScanner() {
        if (scanStream) scanStream.getTracks().forEach(t => t.stop());
        document.getElementById('scannerContainer').classList.add('hidden');
    }
    function tick() {
        const v = document.getElementById('video');
        if(v.readyState === v.HAVE_ENOUGH_DATA) {
            const c = document.createElement("canvas"); c.width=v.videoWidth; c.height=v.videoHeight;
            c.getContext("2d").drawImage(v,0,0,c.width,c.height);
            const code = jsQR(c.getContext("2d").getImageData(0,0,c.width,c.height).data, c.width, c.height);
            if(code) { stopScanner(); loadMachine(code.data); return; }
        }
        if(!document.getElementById('scannerContainer').classList.contains('hidden')) requestAnimationFrame(tick);
    }
</script>
</body>
</html>
